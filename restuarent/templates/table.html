{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Orders Table</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
    <h2 class="text-center mb-4">User Orders</h2>


    <table class="table table-bordered table-striped">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>products</th>
                <th>description</th>
                <th>price</th>
                <th>image</th>
                <th>sizes</th>
                <th>flavours</th>
                <th>category</th>
                
            </tr>
        </thead>
        <tbody>
            {% for product in Entry %}
            
<tr>
    <td>{{ Entry.id }}</td>
    <td>{{ Entry.name }}</td> 
    <td>{{ Entry.description }}</td>
    <td>{{ Entry.price }}</td>
    <td>{{ Entry.size }}</td>
    <td>{{ Entry.flavour }}</td>  
    <td>{{ Entry.category }}</td>
    <td>{{ Entry.image }}</td>
    <td><img src="{{ Entry.image }}" width="100" height="100"></td>
</tr>
{% endfor %}

        </tbody>
    </table>
</div>

</body>
</html>
