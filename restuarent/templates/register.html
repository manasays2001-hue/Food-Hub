{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register | FoodieHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .card {
            margin-top: 80px;
        }
    </style>
</head>
<body>

    

<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-8">

            <div class="card p-4 shadow mt-4">
               {% if messages %}
    {% for message in messages %}
        <div class="alert 
            {% if message.tags == 'error' %}alert-danger
            {% else %}alert-success
            {% endif %}">
            {{ message }}
        </div>
    {% endfor %}
{% endif %}


                <form method="POST">
                    {% csrf_token %}

                    <!-- Account Details -->
                    <h5 class="mb-3">Account Details</h5>

<div class="row">

    <div class="col-md-6 mb-3">
        <label class="form-label">Full Name</label>
        <input type="text" name="full_name" class="form-control" required>
    </div>

    <div class="col-md-6 mb-3">
        <label class="form-label">Email</label>
        <input type="email" name="email" class="form-control" required>
    </div>

    <div class="col-md-6 mb-3">
        <label class="form-label">Phone Number</label>
        <input type="text" name="phone" class="form-control" required>
    </div>

    <div class="col-md-6 mb-3">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" required>
    </div>

    <div class="col-md-6 mb-3">
        <label class="form-label">Confirm Password</label>
        <input type="password" name="confirm_password" class="form-control" required>
    </div>

</div>

<div class="row">
    <div class="col-md-12 mb-3">
    <label class="form-label">Address Type</label><br>

    <div class="form-check form-check-inline">
        <input class="form-check-input" type="radio" name="address_type" value="home" required>
        <label class="form-check-label">Home</label>
    </div>

    <div class="form-check form-check-inline">
        <input class="form-check-input" type="radio" name="address_type" value="office">
        <label class="form-check-label">Office</label>
    </div>

    <div class="form-check form-check-inline">
        <input class="form-check-input" type="radio" name="address_type" value="other">
        <label class="form-check-label">Other</label>
    </div>
</div>

    <div class="col-md-6 mb-3">
        <label class="form-label">Street</label>
        <input type="text" name="street" class="form-control">
    </div>

    <div class="col-md-6 mb-3">
        <label class="form-label">City</label>
        <input type="text" name="city" class="form-control">
    </div>

    <div class="col-md-6 mb-3">
        <label class="form-label">Landmark</label>
        <input type="text" name="landmark" class="form-control">
    </div>

    <div class="col-md-6 mb-3">
        <label class="form-label">Zip Code</label>
        <input type="text" name="zip_code" class="form-control">
    </div>

</div>
                    </div>

                   {% if update_mode %}
    <button type="submit" class="btn btn-success w-100 mt-3">
        Update Address
    </button>
{% else %}
    <button type="submit" class="btn btn-primary w-100 mt-3">
        Register
    </button>
{% endif %}
                    </p>
                </form>
            </div>

        </div>
    </div>
</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
