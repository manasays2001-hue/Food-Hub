
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add product</title>
   <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>
  
<section class="py-5 bg-light">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-8">

        <div class="card shadow-lg border-0 rounded-4">
          
          <div class="card-header bg-dark text-white text-center rounded-top-4">
            <h4 class="mb-0">Add New Product</h4>
          </div>

          <div class="card-body p-4">

            <form method="POST" action="{% url 'product' %}">
              {% csrf_token %}

              <div class="row g-3">

                <!-- Product Name -->
                <div class="col-md-6">
                  <label class="form-label fw-semibold">Product Name</label>
                  <input type="text" name="name" class="form-control rounded-3" required>
                </div>

                <!-- Price -->
                <div class="col-md-6">
                  <label class="form-label fw-semibold">Price</label>
                  <input type="number" step="0.01" name="price" class="form-control rounded-3">
                </div>

                <!-- Description -->
                <div class="col-12">
                  <label class="form-label fw-semibold">Description</label>
                  <textarea name="description" rows="3" class="form-control rounded-3" required></textarea>
                </div>

                <!-- Image -->
                <div class="col-md-6">
                  <label class="form-label fw-semibold">Image URL</label>
                  <input type="url" name="image" class="form-control rounded-3" required>
                </div>

                <!-- Size -->
                <div class="col-md-6">
                  <label class="form-label fw-semibold">Size</label>
                  <input type="text" name="size" class="form-control rounded-3" required>
                </div>

                <!-- Flavour -->
                <div class="col-md-6">
                  <label class="form-label fw-semibold">Flavour</label>
                  <input type="text" name="flavour" class="form-control rounded-3" required>
                </div>

                <!-- Category -->
                <div class="col-md-6">
                  <label class="form-label fw-semibold">Category</label>
                  <select name="category" class="form-select rounded-3" required>
                    <option value="">Select Category</option>
                    <option value="popular">Popular Dish</option>
                    <option value="main">Main Course</option>
                    <option value="beverage">Beverage</option>
                  </select>
                </div>

                <!-- Button -->
                <div class="col-12 text-center mt-3">
                  <button type="submit" class="btn btn-success px-5 py-2 rounded-pill">
                    Add Product
                  </button>
                </div>

              </div>
            </form>

          </div>
        </div>

      </div>
    </div>
  </div>
</section>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>


</body>
</html>
