<!DOCTYPE html>
<html>
<head>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>

<div class="container mt-5">

<div class="row justify-content-center">

<div class="col-md-6">

<div class="card shadow">

<div class="card-header bg-dark text-white">
<h4>User Profile</h4>
</div>

<div class="card-body">

<form method="POST">
{% csrf_token %}

<h5 class="mb-3">Account Details</h5>

<div class="row">

<div class="col-md-6 mb-3">
<label class="form-label">Full Name</label>
<input type="text" name="full_name" class="form-control"
value="{{ user.first_name }} {{ user.last_name }}" required>
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Email</label>
<input type="email" name="email" class="form-control"
value="{{ user.email }}" required>
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Phone Number</label>
<input type="text" name="phone" class="form-control"
value="{{ address.phone }}">
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Password</label>
<input type="password" name="password" class="form-control"
placeholder="Leave blank to keep current password">
</div>

</div>


<h5 class="mt-4 mb-3">Address</h5>

<div class="row">

<div class="col-md-6 mb-3">
<label class="form-label">Address Line</label>
<input type="text" name="address_line" class="form-control"
value="{{ address.address_line|default:'' }}">
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Street</label>
<input type="text" name="street" class="form-control"
value="{{ address.street|default:'' }}">
</div>

<div class="col-md-6 mb-3">
<label class="form-label">City</label>
<input type="text" name="city" class="form-control"
value="{{ address.city|default:'' }}">
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Landmark</label>
<input type="text" name="landmark" class="form-control"
value="{{ address.landmark|default:'' }}">
</div>

<div class="col-md-6 mb-3">
<label class="form-label">Zip Code</label>
<input type="text" name="zip_code" class="form-control"
value="{{ address.zip_code|default:'' }}">
</div>

</div>

<button type="submit" class="btn btn-success w-100 mt-3">
Update Profile
</button>

</form>

</div>

</div>

</div>

</div>

</div>

</body>
</html>
