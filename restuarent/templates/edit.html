<!DOCTYPE html>
<html>
<head>
  <title>Edit Product</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
  <div class="card p-4 shadow">
    <h3 class="text-center mb-4">Edit Product</h3>

    <form method="POST">
  {% csrf_token %}

  <div class="mb-3">
    <label>Product Name</label>
    <input type="text" name="name" class="form-control" value="{{ product.name }}">
  </div>

  <div class="mb-3">
    <label>Price</label>
    <input type="number" step="0.01" name="price" class="form-control" value="{{ product.price }}">
  </div>

  <div class="mb-3">
    <label>Description</label>
    <textarea name="description" class="form-control">{{ product.description }}</textarea>
  </div>

  <div class="mb-3">
    <label>Image URL</label>
    <input type="url" name="image" class="form-control" value="{{ product.image }}">
  </div>

  <div class="mb-3">
    <label>Size</label>
    <input type="text" name="size" class="form-control" value="{{ product.size }}">
  </div>

  <div class="mb-3">
    <label>Flavour</label>
    <input type="text" name="flavour" class="form-control" value="{{ product.flavour }}">
  </div>

  <div class="mb-3">
    <label>Category</label>
    <select name="category" class="form-select">
      <option value="popular" {% if product.category == "popular" %}selected{% endif %}>Popular Dish</option>
      <option value="main" {% if product.category == "main" %}selected{% endif %}>Main Course</option>
      <option value="beverage" {% if product.category == "beverage" %}selected{% endif %}>Beverage</option>
    </select>
  </div>

  <button type="submit" class="btn btn-success w-100">
    Update Product
  </button>
</form>

  </div>
</div>

</body>
</html>
